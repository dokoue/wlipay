<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background: #fff; text-align: center; padding-top: 50px;">
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // On lance le scanner natif de Telegram immédiatement
        tg.showScanQrPopup({
            text: "Scannez le QR Code Wli du client"
        }, function(text) {
            // Envoie la donnée au bot
            tg.sendData(text);
            // Ferme le scanner
            tg.closeScanQrPopup();
            // Ferme la Mini App
            tg.close();
            return true;
        });
    </script>
    <p>Ouverture du scanner...</p>
</body>
</html>
