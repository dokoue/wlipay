<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const statusDisplay = document.getElementById('status');
    
    // 1. Initialisation du scanner sur l'élément 'reader'
    const html5QrCode = new Html5Qrcode("reader");

    const config = { fps: 15, qrbox: { width: 250, height: 250 } };

    // 2. Fonction de démarrage automatique
    function startScanner() {
        // 'environment' force l'utilisation de la caméra arrière
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch((err) => {
            statusDisplay.innerText = "❌ Erreur caméra : " + err;
            statusDisplay.style.color = "red";
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (navigator.vibrate) navigator.vibrate(100);
        
        statusDisplay.innerText = "✅ Scan réussi !";
        statusDisplay.style.color = "green";

        // Arrêter la caméra avant de renvoyer les données
        html5QrCode.stop().then(() => {
            tg.sendData(decodedText);
        }).catch(() => {
            tg.sendData(decodedText); // On envoie quand même si le stop échoue
        });
    }

    // Lancer le scan dès que la page est prête
    window.addEventListener('load', startScanner);
</script>
